apiVersion: v1
kind: Service
metadata:
  name: ipfs-service
  namespace: default
spec:
  selector:
    app: ipfs-node
  ports:
  - name: swarm
    port: 4001
    targetPort: 4001
  - name: api
    port: 5001
    targetPort: 5001
  - name: gateway
    port: 8080
    targetPort: 8080
  type: ClusterIP
